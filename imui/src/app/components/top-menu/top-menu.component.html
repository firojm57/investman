<header
  class="h-16 w-full border-b border-border bg-card/85 backdrop-blur-md sticky top-0 z-50 flex items-center justify-between px-4 md:px-8 transition-colors duration-300">
  <!-- Left: Hamburger Button (mobile only), Logo & Brand Name -->
  <div class="flex items-center space-x-2.5">
    <button (click)="dashboardService.toggleMobileMenu()"
      class="md:hidden flex items-center justify-center w-9 h-9 rounded-xl hover:bg-background border border-border/60 text-text-primary cursor-pointer transition-colors duration-200"
      aria-label="Toggle Mobile Menu">
      <svg class="w-5.5 h-5.5">
        <use href="assets/icons.svg#icon-menu"></use>
      </svg>
    </button>

    <div
      class="w-9 h-9 bg-accent-secondary rounded-xl flex items-center justify-center text-white shadow-sm shadow-accent-secondary/35">
      <svg class="w-5.5 h-5.5">
        <use href="assets/icons.svg#icon-logo"></use>
      </svg>
    </div>
    <span class="font-extrabold text-lg md:text-xl tracking-tight text-text-primary">Mio<span class="font-semibold"> Wealth</span></span>
  </div>

  <!-- Right: Search, Notification Bell, Theme Toggle, User Profile Dropdown -->
  <div class="flex items-center space-x-3.5">
    <!-- Search input box (Hidden on mobile) -->
    <div class="relative hidden sm:block">
      <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-text-secondary">
        <svg class="w-4.5 h-4.5">
          <use href="assets/icons.svg#icon-search"></use>
        </svg>
      </span>
      <input type="text" placeholder="Search..."
        class="pl-9 pr-4 py-1.5 w-44 md:w-56 text-sm rounded-full bg-background border border-border text-text-primary placeholder-text-secondary focus:outline-none focus:ring-1 focus:ring-accent-secondary transition-all duration-300" />
    </div>

    <!-- Theme Toggle Button (strictly positioned between Search and User Profile) -->
    <button (click)="dashboardService.toggleTheme()"
      class="w-9 h-9 rounded-full flex items-center justify-center border border-border text-text-primary hover:bg-background transition-all duration-300 cursor-pointer shadow-sm"
      [title]="'APP.THEME_TOGGLE' | translate">
      <svg class="w-5 h-5 rotate-0 scale-100 dark:rotate-90 dark:scale-100 transition-all duration-500">
        <use [attr.href]="dashboardService.isDark() ? 'assets/icons.svg#icon-sun' : 'assets/icons.svg#icon-moon'"></use>
      </svg>
    </button>

    <!-- Notification Bell -->
    <button
      class="relative w-9 h-9 rounded-full flex items-center justify-center border border-border text-text-primary hover:bg-background transition-all duration-300 cursor-pointer shadow-sm">
      <svg class="w-5 h-5">
        <use href="assets/icons.svg#icon-bell"></use>
      </svg>
      <!-- Active red badge -->
      <span class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-feedback-danger animate-pulse"></span>
    </button>

    <!-- User Profile Avatar with Click Dropdown -->
    <div class="relative">
      <button (click)="toggleProfileDropdown()"
        class="flex items-center justify-center p-0.5 rounded-full border border-border hover:ring-2 hover:ring-accent-secondary transition-all duration-300 cursor-pointer">
        <div
          class="w-8 h-8 rounded-full bg-gradient-to-tr from-accent-primary to-accent-primary/80 text-card font-bold text-xs flex items-center justify-center shadow-sm">
          FM
        </div>
      </button>

      <!-- Clickable dropdown wrapper backdrop to dismiss on clicking outside and settings menu -->
      @if (showProfileDropdown) {
      <div (click)="closeDropdown()" class="fixed inset-0 z-40 bg-transparent"></div>

      <!-- Settings Dropdown Menu (Right aligned) -->
      <div
        class="absolute right-0 top-11 mt-2 w-48 bg-card border border-border rounded-2xl shadow-xl z-50 py-2 animate-fade-in transition-colors duration-300">
        <div class="px-4 py-2 border-b border-border/50">
          <div class="font-bold text-xs text-text-primary">Firoj Mujawar</div>
          <div class="font-medium text-[10px] text-text-secondary mt-0.5">firojm57@gmail.com</div>
        </div>

        <button (click)="selectSettings()"
          class="w-full text-left px-4 py-2 font-semibold text-xs text-text-primary hover:bg-background transition-colors duration-200 flex items-center space-x-2 cursor-pointer">
          <svg class="w-4 h-4 text-text-secondary">
            <use href="assets/icons.svg#icon-settings"></use>
          </svg>
          <span>{{ 'NAV.SETTINGS' | translate }}</span>
        </button>

        <button (click)="closeDropdown()"
          class="w-full text-left px-4 py-2 font-semibold text-xs text-feedback-danger hover:bg-background transition-colors duration-200 flex items-center space-x-2 cursor-pointer">
          <svg class="w-4 h-4 text-feedback-danger">
            <use href="assets/icons.svg#icon-logout"></use>
          </svg>
          <span>Sign Out</span>
        </button>
      </div>
      }
    </div>
  </div>
</header>
