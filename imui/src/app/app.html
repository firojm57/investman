<div class="min-h-screen bg-background text-text-primary transition-colors duration-300 flex flex-col pb-16 md:pb-0">
  <!-- Top Menu (Fixed, full width) -->
  <app-top-menu class="h-16 w-full sticky top-0 z-50 bg-card/85 backdrop-blur-md border-b border-border/10"></app-top-menu>

  <!-- Body Layout Area (Mobile-First: flex-col, changing to flex-row on Tablet/Desktop) -->
  <div class="flex-1 flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <!-- Side Menu: Hidden on Mobile, Left Vertical Column on Tablet/Desktop -->
    <app-side-menu class="w-full md:w-24 xl:w-28 sticky md:h-[calc(100vh-4rem)] md:top-16 z-40 md:z-auto"></app-side-menu>

    <!-- Main Viewport Context (Mobile-First padding) -->
    <main class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto">
      <app-content></app-content>
    </main>
  </div>
</div>
